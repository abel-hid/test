# deployment.yaml from https://github.com/abel-hid/test.git
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: app
        image: guuts/my-app:v1
        ports:
        - containerPort: 8888
        env:
        - name: APP_NAME
          value: "My App"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
---
apiVersion: v1
kind: Service
metadata:
  name: my-app-service
  namespace: dev
spec:
  type: NodePort            
  selector:
    app: my-app
  ports:
    - protocol: TCP
      port: 8888          
      targetPort: 8888
